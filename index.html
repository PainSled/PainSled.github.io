<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WASM Demo</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 640px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    #output {
      background: #f4f4f4;
      padding: 1rem;
      border-radius: 4px;
      white-space: pre-wrap;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <h1>WASM Demo</h1>
  <pre id="output">Loading…</pre>

  <script>
    const WASM_VERSION = '1.0.0';

    async function loadWasm() {
      const output = document.getElementById('output');
      try {
        const resp = await fetch(`app.wasm?v=${WASM_VERSION}`, { cache: 'no-cache' });
        if (!resp.ok) throw new Error(`Fetch failed: ${resp.status} ${resp.statusText}`);

        const bytes = await resp.arrayBuffer();
        const { instance } = await WebAssembly.instantiate(bytes);

        output.textContent = 'WASM loaded successfully.\nExported functions: '
          + Object.keys(instance.exports).join(', ');
      } catch (err) {
        output.textContent = 'Error loading WASM:\n' + err.message
          + '\n\nMake sure app.wasm exists in the repository root.';
      }
    }

    loadWasm();
  </script>
</body>
</html>
